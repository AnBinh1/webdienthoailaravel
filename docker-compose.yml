services:
  db:
    image: mysql:8.0
    container_name: webdienthoai-db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: webdienthoai
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: webdienthoai-web
    ports:
      - "8080:80"
    environment:
      APP_ENV: production
      APP_KEY: base64:3MFnK53erwV+fqUpY/XOj0//vH80hfG7AOZEfNxZZcU=
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: webdienthoai
      DB_USERNAME: root
      DB_PASSWORD: secret
    depends_on:
      - db

  localstack:
    image: localstack/localstack:3.8
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sns,iam
      DEBUG: 1
    volumes:
      - ./localstack-data:/var/lib/localstack

volumes:
  db_data: