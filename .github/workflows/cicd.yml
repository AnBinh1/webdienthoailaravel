name: CI/CD Pipeline - WebDienThoai

on:
  push:
    branches: [ master ]

jobs:

  # ══════════════════════
  # JOB 1: BUILD
  # ══════════════════════
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/webdienthoai:${{ github.sha }}

  # ══════════════════════
  # JOB 2: TEST
  # ══════════════════════
  test:
    name: Run PHPUnit Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: webdienthoai_testing
          MYSQL_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -psecret" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql

      - name: Copy .env.testing
        run: cp .env.testing .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate app key
        run: php artisan key:generate

      - name: Wait for MySQL
        run: sleep 10

      - name: Run migrations
        run: php artisan migrate --env=testing --force

      - name: Run tests
        run: php artisan test --env=testing

  # ══════════════════════
  # JOB 3: DEPLOY STAGING
  # ══════════════════════
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: staging
    steps:
      - name: Deploy staging
        run: echo "✅ Staging deployed successfully!"

  # ══════════════════════
  # JOB 4: DEPLOY PRODUCTION (manual approval)
  # ══════════════════════
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production
    steps:
      - name: Deploy production
        run: echo "🚀 Production deployed successfully!"